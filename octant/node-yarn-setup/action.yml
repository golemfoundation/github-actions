name: 'Node.js and Yarn Setup'
description: 'Setup Node.js with Corepack, configure npm auth for private packages, and install dependencies'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  npm-auth-token:
    description: 'NPM auth token for private @golemfoundation packages'
    required: false
    default: ''
  install-dependencies:
    description: 'Run yarn install --immutable'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack (and setup Yarn)
      shell: bash
      run: corepack enable

    - name: Set npm auth token
      if: inputs.npm-auth-token != ''
      shell: bash
      env:
        NPM_AUTH_TOKEN: ${{ inputs.npm-auth-token }}
      run: |
        yarn config set -H npmScopes.golemfoundation.npmAuthToken "${NPM_AUTH_TOKEN}"

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: yarn install --immutable
