name: 'Release Dev Tag'
description: 'Calculate next development version and create tag'

inputs:
  github-token:
    description: 'GitHub token for release-it'
    required: true
  git-cliff-version:
    description: 'git-cliff version to install'
    required: false
    default: '2.12.0'
  git-cliff-sha256:
    description: 'SHA256 checksum of the git-cliff .deb package for integrity verification'
    required: false
    default: 'ae9eadaac20c3d0a5bcfb47ac79d6898ee5e08d189d0494080b61a79fbb28a97'

outputs:
  version:
    description: 'The new version created'
    value: ${{ steps.release.outputs.version }}
  tag_name:
    description: 'The tag name created'
    value: ${{ steps.release.outputs.tag_name }}

runs:
  using: 'composite'
  steps:
    - name: Install git-cliff
      shell: bash
      env:
        GIT_CLIFF_VERSION: ${{ inputs.git-cliff-version }}
        GIT_CLIFF_SHA256: ${{ inputs.git-cliff-sha256 }}
      run: |
        if ! command -v git-cliff &>/dev/null || [[ "$(git-cliff --version 2>/dev/null)" != *"${GIT_CLIFF_VERSION}"* ]]; then
          curl -sSfL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}.deb" -o /tmp/git-cliff.deb
          if [[ -n "${GIT_CLIFF_SHA256}" ]]; then
            echo "${GIT_CLIFF_SHA256}  /tmp/git-cliff.deb" | sha256sum -c -
          else
            echo "::warning::No SHA256 checksum provided for git-cliff ${GIT_CLIFF_VERSION} — skipping verification"
          fi
          sudo dpkg -i /tmp/git-cliff.deb
          rm -f /tmp/git-cliff.deb
        fi
        git-cliff --version

    - name: Create release
      id: release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        # Calculate next dev version
        CURRENT=$(node -p "require('./package.json').version")
        if [[ "$CURRENT" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-develop\.([0-9]+)$ ]]; then
          # Already prerelease: 1.2.4-develop.0 → 1.2.4-develop.1
          BASE="${BASH_REMATCH[1]}"
          DEV_NUM=$((${BASH_REMATCH[2]} + 1))
          NEW_VERSION="${BASE}-develop.${DEV_NUM}"
        else
          # Stable version: 1.2.4 → 1.2.4-develop.0
          NEW_VERSION="${CURRENT}-develop.0"
        fi

        echo "Current version: ${CURRENT}"
        echo "New version: ${NEW_VERSION}"

        # Set CHANGELOG_FROM for git-cliff (used by release-it hook)
        export CHANGELOG_FROM=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

        # Run release-it with explicit version
        # --no-github.release: dev tags don't need GitHub releases (only production does)
        # --git.tagMatch="*-develop.*" --npm.ignoreVersion are optional if we don't want to use .release-it-custom-version.mjs plugin
        npx release-it "${NEW_VERSION}" --ci --no-github.release 

        echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "tag_name=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "Successfully created tag: ${NEW_VERSION}"
