name: 'Release Create Tag'
description: 'Create production release tag after approval'

inputs:
  source-type:
    description: 'Source type: dev-tag or hotfix'
    required: true
  source-ref:
    description: 'Git ref to merge/release'
    required: true
  version:
    description: 'Version to create'
    required: true
  master-branch:
    description: 'Production branch name'
    required: false
    default: 'master'
  github-token:
    description: 'GitHub token for release-it'
    required: true
  changelog-from:
    description: 'Git ref to generate changelog from (typically last release tag)'
    required: true
  git-cliff-version:
    description: 'git-cliff version to install'
    required: false
    default: '2.12.0'
  git-cliff-sha256:
    description: 'SHA256 checksum of the git-cliff .deb package for integrity verification'
    required: false
    default: 'ae9eadaac20c3d0a5bcfb47ac79d6898ee5e08d189d0494080b61a79fbb28a97'

outputs:
  tag_name:
    description: 'The tag name created'
    value: ${{ steps.create-release.outputs.tag_name }}

runs:
  using: 'composite'
  steps:
    - name: Install git-cliff
      shell: bash
      env:
        GIT_CLIFF_VERSION: ${{ inputs.git-cliff-version }}
        GIT_CLIFF_SHA256: ${{ inputs.git-cliff-sha256 }}
      run: |
        if ! command -v git-cliff &>/dev/null || [[ "$(git-cliff --version 2>/dev/null)" != *"${GIT_CLIFF_VERSION}"* ]]; then
          curl -sSfL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}.deb" -o /tmp/git-cliff.deb
          if [[ -n "${GIT_CLIFF_SHA256}" ]]; then
            echo "${GIT_CLIFF_SHA256}  /tmp/git-cliff.deb" | sha256sum -c -
          else
            echo "::warning::No SHA256 checksum provided for git-cliff ${GIT_CLIFF_VERSION} — skipping verification"
          fi
          sudo dpkg -i /tmp/git-cliff.deb
          rm -f /tmp/git-cliff.deb
        fi
        git-cliff --version

    - name: Merge source into master (if dev tag)
      if: inputs.source-type == 'dev-tag'
      shell: bash
      env:
        SOURCE_REF: ${{ inputs.source-ref }}
        MASTER_BRANCH: ${{ inputs.master-branch }}
      run: |
        git fetch --all --tags
        git checkout "${MASTER_BRANCH}"
        git pull origin "${MASTER_BRANCH}"
        echo "Merging ${SOURCE_REF} into ${MASTER_BRANCH}..."
        if ! git merge --ff-only "${SOURCE_REF}"; then
          echo "Error: Cannot fast-forward merge. ${MASTER_BRANCH} may have diverged."
          exit 1
        fi

    - name: Checkout master (if hotfix)
      if: inputs.source-type == 'hotfix'
      shell: bash
      env:
        MASTER_BRANCH: ${{ inputs.master-branch }}
      run: |
        git fetch --all --tags
        git checkout "${MASTER_BRANCH}"
        git pull origin "${MASTER_BRANCH}"

    - name: Create release
      id: create-release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PROPOSED_VERSION: ${{ inputs.version }}
        MASTER_BRANCH: ${{ inputs.master-branch }}
        CHANGELOG_FROM: ${{ inputs.changelog-from }}
      run: |
        export GIT_CLIFF_IGNORE_TAGS='.*develop.*'
        npx release-it "${PROPOSED_VERSION}" --ci
        echo "tag_name=${PROPOSED_VERSION}" >> $GITHUB_OUTPUT
        git push origin "${MASTER_BRANCH}" --follow-tags
