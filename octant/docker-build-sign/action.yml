name: 'Docker Build and Sign'
description: 'Build, push, and sign a Docker image'

inputs:
  registry:
    description: 'Docker registry URL'
    required: true
  image-name:
    description: 'Image name (without registry prefix)'
    required: true
  image-tag:
    description: 'Image tag'
    required: true
  context:
    description: 'Docker build context path'
    required: false
    default: '.'
  dockerfile:
    description: 'Dockerfile path'
    required: false
    default: 'Dockerfile'
  build-args:
    description: 'Build arguments (multiline KEY=VALUE)'
    required: false
    default: ''
  build-secrets:
    description: 'Build secrets (multiline KEY=VALUE)'
    required: false
    default: ''
  gcp-service-account:
    description: 'GCP service account key (base64 encoded JSON)'
    required: true
  cache-image:
    description: 'Cache image reference'
    required: false
    default: ''
  sign:
    description: 'Whether to sign the image with Cosign'
    required: false
    default: 'true'

outputs:
  digest:
    description: 'Image digest'
    value: ${{ steps.build.outputs.digest }}
  image-ref:
    description: 'Full image reference with tag'
    value: ${{ steps.meta.outputs.tags }}
  image-with-digest:
    description: 'Full image reference with digest'
    value: ${{ inputs.registry }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}

runs:
  using: 'composite'
  steps:
    - name: Install Cosign
      if: inputs.sign == 'true'
      uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

    - name: Setup isolated Docker config
      shell: bash
      run: |
        mkdir -p ${RUNNER_TEMP}/.docker
        echo "DOCKER_CONFIG=${RUNNER_TEMP}/.docker" >> $GITHUB_ENV

    - name: Login to Docker registry
      uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
      with:
        registry: ${{ inputs.registry }}
        username: _json_key_base64
        password: ${{ inputs.gcp-service-account }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
      with:
        images: ${{ inputs.registry }}/${{ inputs.image-name }}
        tags: type=raw,value=${{ inputs.image-tag }}

    - name: Build and push container image
      id: build
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.context }}/${{ inputs.dockerfile }}
        secrets: ${{ inputs.build-secrets }}
        build-args: ${{ inputs.build-args }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: ${{ inputs.cache-image != '' && format('type=registry,ref={0}', inputs.cache-image) || '' }}
        cache-to: ${{ inputs.cache-image != '' && format('type=registry,ref={0},mode=max', inputs.cache-image) || '' }}

    - name: Sign the image with GitHub OIDC Token
      if: inputs.sign == 'true'
      shell: bash
      env:
        DIGEST: ${{ steps.build.outputs.digest }}
        TAGS: ${{ steps.meta.outputs.tags }}
      run: |
        images=""
        for tag in ${TAGS}; do
          images+="${tag}@${DIGEST} "
        done
        echo "Signing images: $images"
        cosign sign --yes ${images}
