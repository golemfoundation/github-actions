name: 'Create Sync PR'
description: 'Create PR to sync master back to develop after production release'

inputs:
  version:
    description: 'Released version'
    required: true
  source:
    description: 'Original source input'
    required: true
  source-type:
    description: 'Source type: dev-tag or hotfix'
    required: true
  base-branch:
    description: 'Target branch'
    required: false
    default: 'develop'
  head-branch:
    description: 'Source branch'
    required: false
    default: 'master'
  github-token:
    description: 'GitHub token for gh CLI'
    required: true
  github-server-url:
    description: 'GitHub server URL'
    required: false
    default: 'https://github.com'
  github-repository:
    description: 'Repository in owner/repo format'
    required: true

outputs:
  pr_url:
    description: 'URL of the created PR'
    value: ${{ steps.create-pr.outputs.pr_url }}

runs:
  using: 'composite'
  steps:
    - name: Create PR to sync master back to develop
      id: create-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TARGET_VERSION: ${{ inputs.version }}
        SOURCE: ${{ inputs.source }}
        SOURCE_TYPE: ${{ inputs.source-type }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        HEAD_BRANCH: ${{ inputs.head-branch }}
        GITHUB_SERVER_URL: ${{ inputs.github-server-url }}
        GITHUB_REPOSITORY: ${{ inputs.github-repository }}
      run: |
        HOTFIX_LINE=""
        if [[ "$SOURCE_TYPE" == "hotfix" ]]; then
          HOTFIX_LINE="- **Hotfix changes** that were applied directly to ${HEAD_BRANCH}"
        fi

        PR_URL=$(gh pr create \
          --base "${BASE_BRANCH}" \
          --head "${HEAD_BRANCH}" \
          --title "chore: sync version ${TARGET_VERSION} from ${HEAD_BRANCH} [skip ci]" \
          --body "$(cat <<EOF
        ## Sync ${HEAD_BRANCH} to ${BASE_BRANCH}

        This PR syncs the production release changes back to the ${BASE_BRANCH} branch.

        **Version:** \`${TARGET_VERSION}\`
        **Source:** \`${SOURCE}\` (${SOURCE_TYPE})
        **Release:** [${TARGET_VERSION}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${TARGET_VERSION})

        ### What's included?
        - Updated \`CHANGELOG.md\` with production release notes
        - Version bump in \`package.json\`
        ${HOTFIX_LINE}

        ### Resolving conflicts
        If there are merge conflicts (typically in \`CHANGELOG.md\`), resolve them by keeping both sets of changes.

        ---
        _Auto-generated by production release workflow_
        EOF
        )")
        echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT
